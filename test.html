<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>test.html</title>
    <style>
        /* 与预览相同的样式 */
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 
                       'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        pre { 
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        code { 
            background: #f0f0f0; 
            padding: 2px 4px; 
            font-family: 'Consolas', monospace;
        }
        table {
            border-collapse: collapse; 
            width: 100%;
            margin: 15px 0;
        }
        th, td { 
            border: 1px solid #ddd; 
            padding: 8px;
            text-align: left;
        }
        th { 
            background: #f5f5f5;
            font-weight: bold;
        }
        blockquote {
            border-left: 4px solid #ddd;
            margin: 1.5em 0;
            padding: 0.5em 1em;
            color: #666;
        }
        .math { color: #e74c3c; }
        a {
        text-decoration: none;
        color: #3498db;

        }
        
    </style>
</head>
<body>
    <h1>欢迎使用Qnote</h1>
<p>这是一个基于python的编辑器</p>
<p>I want to make friends with you！</p>
</body>
</html>
