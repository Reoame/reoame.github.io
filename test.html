<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章搜索页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

 .container {
      width: 80%;
      margin: 50px auto;
    }

 .search-bar {
      margin-bottom: 20px;
    }

 .search-bar input {
      width: 70%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

 .search-bar button {
      padding: 10px 20px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

 .article {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 20px;
    }

 .article h3 {
      margin-top: 0;
    }

 .article p {
      color: #666;
    }

 .article.tags {
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>文章搜索</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="输入关键词搜索文章">
      <button onclick="searchArticles()">搜索</button>
    </div>
    <div id="articleList"></div>
  </div>

  <script>
    let articles = [];

    // 读取JSON文件数据
    fetch('data/articles.json')
     .then(response => response.json())
     .then(data => {
          articles = data;
          displayArticles(articles);
        })
     .catch(error => {
          console.error('Error fetching data:', error);
        });

    function displayArticles(articles) {
      const articleList = document.getElementById('articleList');
      articleList.innerHTML = '';
      articles.forEach(article => {
        const articleDiv = document.createElement('div');
        articleDiv.classList.add('article');
        articleDiv.innerHTML = `
          <h3>${article.title}</h3>
          <p>发布时间: ${article.publishTime}</p>
          <p class="tags">标签: ${article.tags.join(', ')}</p>
        `;
        articleList.appendChild(articleDiv);
      });
    }

    function searchArticles() {
      const searchInput = document.getElementById('searchInput').value.toLowerCase();
      const filteredArticles = articles.filter(article => {
        return article.title.toLowerCase().includes(searchInput) ||
          article.tags.some(tag => tag.toLowerCase().includes(searchInput));
      });
      displayArticles(filteredArticles);
    }
  </script>

</body>

</html>
