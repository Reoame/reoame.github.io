<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目 - Reoame的博客</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
    font-family: 'Roboto', Arial, sans-serif;
    background: linear-gradient(135deg, #1296DC, #87CEEB);
    color: #333;
    line-height: 1.6;
}
.header {
    background-color: #343a40;
    color: white;
    padding: 2rem 0;
    text-align: center;
    border-radius: 0 0 10px 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}
.item {
    margin: 0 1rem;
    padding: 0.5rem 1rem;
    background-color: #495057;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.3s;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}
.item:hover {
    background-color: #6c757d;
    transform: scale(1.05);
}
.header h1 {
    font-size: 3rem;
    font-weight: 700;
}
.header p {
    font-size: 1.5rem;
    font-weight: 300;
}
.R {
    width: 100px;
    height: 100px;
    color: white;
    background-color: #1296DC;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    margin: 0 auto;
}
.container {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    padding: 2rem;
}
.blog-post {
    border-bottom: 1px solid #ddd;
    padding-bottom: 1rem;
    margin-bottom: 1rem;
}
.blog-post-title {
    font-size: 1.8rem;
    font-weight: 700;
}
.blog-post-meta {
    font-size: 1rem;
    color: #666;
}
.btn-primary {
    background-color: #1296DC;
    border-color: #1296DC;
    font-weight: 500;
    transition: background-color 0.3s, transform 0.3s;
}
.btn-primary:hover {
    background-color: #0056b3;
    transform: scale(1.05);
}
.aside-box {
    background: #f9f9f9;
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 1rem;
}
.aside-box h4 {
    font-size: 1.2rem;
    font-weight: 500;
}
.blog-footer {
    background-color: #343a40;
    color: white;
    text-align: center;
    padding: 1rem 0;
    margin-top: 2rem;
    border-radius: 10px;
    box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
}
.tag {
    display: inline-block;
    padding: 0.5px;
    margin: 0 0.5rem;
    border-radius: 5px;
    background-color: #1296DC;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.3s;
}
.tag:hover {
    background-color: #0056b3;
    transform: scale(1.05);
}
    </style>
</head>
<body>
    <div class="header">
        <div class="item_1">
            <center>
                <h1 class="R">R</h1>
            </center>
            <h1 style="color:#333">Reoame</h1>
            <p style="color:#333">Hello I'm Reoame, I want to make friends with you!</p>
        </div>
        <div class="leader">
            <div class="item" onclick="go('index.html')">
                <i class="fas fa-home"></i> 首页
            </div>
            <div class="item" onclick="go('link.html')">
                <i class="fas fa-link"></i> 友链
            </div>
            <div class="item" onclick="go('about.html')">
                <i class="fas fa-user"></i> 关于
            </div>
            <div class="item" onclick="go('projects.html')">
                <i class="fab fa-github"></i> 项目
            </div>
        </div>
    </div>

    <div class="container body">
        <h2 class="pb-3 mb-4 font-italic border-bottom">我的项目</h2>
        <div class="row">
            <div class="col-md-6">
                <div class="project">
                    <h3>Python 小程序</h3>
                    <p>这是一个基于 Python 开发的小程序</p>
                    <a href="https://github.com/Reoame/Pyertool" class="btn btn-primary">查看项目</a>
                </div>
            </div>
            <div class="col-md-6">
                
            </div>
        </div>
    </div>

    <footer class="blog-footer">
        <p>版权所有 © 2025 Reoame的博客</p>
        <p>模板基于 <a href="https://getbootstrap.com/" target="_blank">Bootstrap</a></p>
    </footer>
    <script>
        function go(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>
