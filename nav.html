<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航页 | Reoame</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1296DC;
            --hover-color: #0d7ebd;
            --text-color: #444;
        }

        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            flex: 0 0 auto;
        }

        main {
            flex: 1 0 auto;
            padding-bottom: 2rem;
        }

      .nav-header {
            background: var(--primary-color);
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

      .search-box {
            max-width: 600px;
            margin: 0 auto;
        }

      .search-input {
            border-radius: 25px;
            padding: 15px 25px;
            border: 2px solid var(--primary-color);
            transition: border-color 0.3s ease;
        }

      .search-input:focus {
            border-color: var(--hover-color);
            box-shadow: 0 0 0 0.25rem rgba(18, 150, 220, 0.25);
        }

      .category-card {
            background: white;
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

      .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(18, 150, 220, 0.15);
        }

      .nav-link {
            color: var(--text-color);
            border-radius: 8px;
            padding: 8px 15px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

      .nav-link:hover {
            background: rgba(18, 150, 220, 0.1);
            color: var(--primary-color);
            text-decoration: none;
        }

      .category-title {
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 1rem;
            margin: 1.5rem 0;
        }
    </style>
</head>

<body>
    <header class="nav-header">
        <div class="container">
            <h1 class="text-white mb-4">Reoame的导航页</h1>
            <div class="search-box">
                <input type="text" class="form-control search-input" placeholder="搜索网站或输入网址...">
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 分类区域 -->
        <div class="row g-4" id="navContainer">
            <!-- 内容由JavaScript动态生成 -->
        </div>
    </main>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script>
        // 导航数据
        const navData = [
            {
                title: '常用网站',
                icon: 'fa-star',
                links: [
                    { name: 'GitHub', url: 'https://github.com', icon: 'fa-github' },
                    { name: '知乎', url: 'https://zhihu.com', icon: 'fa-quora' },
                    { name: 'B站', url: 'https://bilibili.com', icon: 'fa-bilibili' },
                    { name: 'V2EX', url: 'https://www.v2ex.com/', icon: 'fa-vimeo-square' },
                    { name: '抖音', url: 'https://www.douyin.com', icon: 'fa-tiktok' }
                ]
            },
            {
                title: '搜索引擎',
                icon: 'fa-search',
                links: [
                    { name: 'Google', url: 'https://google.com', icon: 'fa-google' },
                    { name: '百度', url: 'https://baidu.com', icon: 'fa-baidu' },
                    { name: '必应', url: 'https://bing.com', icon: 'fa-microsoft' }
                ]
            },
            {
                title: '社交媒体',
                icon: 'fa-hashtag',
                links: [
                    { name: '微博', url: 'https://weibo.com', icon: 'fa-weibo' },
                    { name: 'Twitter', url: 'https://twitter.com', icon: 'fa-twitter' },
                    { name: 'Facebook', url: 'https://facebook.com', icon: 'fa-facebook' },
                    { name: 'Instagram', url: 'https://instagram.com', icon: 'fa-instagram' }
                ]
            },
            {
                title: '开发工具',
                icon: 'fa-code',
                links: [
                    { name: 'GitLab', url: 'https://gitlab.com', icon: 'fa-gitlab' },
                    { name: 'Stack Overflow', url: 'https://stackoverflow.com', icon: 'fa-stack-overflow' },
                    { name: 'npm', url: 'https://www.npmjs.com', icon: 'fa-npm' },
                    { name: 'CodePen', url: 'https://codepen.io', icon: 'fa-codepen' },
                    { name: 'JSFiddle', url: 'https://jsfiddle.net', icon: 'fa-js' },
                    { name: 'Visual Studio Code', url: 'https://code.visualstudio.com', icon: 'fas fa-code' }
                ]
            },
            {
                title: '学习平台',
                icon: 'fa-graduation-cap',
                links: [
                    { name: 'Coursera', url: 'https://www.coursera.org', icon: 'fas fa-university' },
                    { name: '慕课网', url: 'https://www.imooc.com', icon: 'fas fa-book' },
                    { name: 'LeetCode', url: 'https://leetcode.cn', icon: 'fas fa-code' },
                    { name: '极客时间', url: 'https://time.geekbang.org', icon: 'fa fa-clock' },
                    { name: 'MDN', url: 'https://developer.mozilla.org', icon: 'fa-firefox' }
                ]
            },
            {
                title: '新闻资讯',
                icon: 'fa-newspaper',
                links: [
                    { name: 'Reuters', url: 'https://www.reuters.com', icon: 'fas fa-rss' },
                    { name: '36氪', url: 'https://36kr.com', icon: 'fas fa-chart-line' },
                    { name: '虎嗅', url: 'https://www.huxiu.com', icon: 'fas fa-paw' }
                ]
            },
            {
                title: '视频娱乐',
                icon: 'fa-film',
                links: [
                    { name: 'YouTube', url: 'https://youtube.com', icon: 'fa-youtube' },
                    { name: 'Netflix', url: 'https://www.netflix.com', icon: 'fas fa-tv' },
                    { name: '豆瓣电影', url: 'https://movie.douban.com', icon: 'fas fa-film' },
                    { name: 'Twitch', url: 'https://www.twitch.tv', icon: 'fa-twitch' },
                    { name: 'Spotify', url: 'https://open.spotify.com', icon: 'fab fa-spotify' },
                    { name: 'B站', url: 'https://bilibili.com', icon: 'fa-bilibili' },
                    { name: '抖音', url: 'https://www.douyin.com', icon: 'fa-tiktok' },
                    { name: '腾讯视频', url: 'https://v.qq.com', icon: 'fa-tencent-weibo' }
                ]
            },
            {
                title: '云服务',
                icon: 'fa-cloud',
                links: [
                    { name: 'AWS', url: 'https://aws.amazon.com', icon: 'fa-amazon' },
                    { name: '阿里云', url: 'https://www.aliyun.com', icon: 'fas fa-cloud' },
                    { name: '腾讯云', url: 'https://cloud.tencent.com', icon: 'fas fa-cloud' },
                    { name: 'Vercel', url: 'https://vercel.com', icon: 'fas fa-bolt' },
                    { name: 'DigitalOcean', url: 'https://www.digitalocean.com', icon: 'fas fa-water' }
                ]
            },
            {
                title: '设计资源',
                icon: 'fa-palette',
                links: [
                    { name: 'Dribbble', url: 'https://dribbble.com', icon: 'fa-dribbble' },
                    { name: 'Behance', url: 'https://www.behance.net', icon: 'fa-behance' },
                    { name: 'Pinterest', url: 'https://www.pinterest.com', icon: 'fa-pinterest' },
                    { name: 'Unsplash', url: 'https://unsplash.com', icon: 'fas fa-camera' },
                    { name: 'Figma', url: 'https://www.figma.com', icon: 'fa-figma' }
                ]
            },
            {
                title: '其他',
                icon: 'fa-ellipsis-h',
                links: [
                    { name: 'GitHub', url: 'https://github.com', icon: 'fa-github' },
                    { name: '博客园', url: 'https://cnblogs.com', icon: 'fas fa-book' },
                    { name: '掘金', url: 'https://juejin.cn', icon: 'fas fa-leaf' },
                    { name: 'SegmentFault', url: 'https://segmentfault.com', icon: 'fas fa-bug' },
                    { name: '开源中国', url: 'https://www.oschina.net', icon: 'fas fa-cloud' },
                    { name: 'Deepseek', url: 'https://www.deepseek.com/', icon: 'fa fa-robot' }
                ]
            }
        ];

        // 生成导航HTML
        function generateNavHTML() {
            const container = document.getElementById('navContainer');
            let html = '';

            navData.forEach(category => {
                html += `
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="category-card p-3">
                            <h5 class="category-title">
                                <i class="fas ${category.icon} me-2"></i>${category.title}
                            </h5>
                            <div class="d-flex flex-wrap gap-2">
                                ${category.links.map(link => `
                                    <a href="${link.url}" target="_blank" class="nav-link">
                                        <i class="fab ${link.icon}"></i>
                                        ${link.name}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 防抖函数
        function debounce(func, delay) {
            let timer;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    func.apply(this, args);
                }, delay);
            };
        }

        // 搜索功能
        const searchInput = document.querySelector('.search-input');
        const debouncedSearch = debounce(function (e) {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('.nav-link').forEach(link => {
                const text = link.textContent.toLowerCase();
                link.style.display = text.includes(searchTerm)? 'flex' : 'none';
            });
        }, 300);

        searchInput.addEventListener('input', debouncedSearch);

        // 初始化
        generateNavHTML();
    </script>
</body>

</html>
