<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Key Shortcut</title>
</head>

<body>
    <script>
        // 监听整个窗口的键盘按下事件
        window.addEventListener('keydown', function (event) {
            // 检查按下的键是否是 Enter 键
            if (event.key === 'Enter' || event.keyCode === 13) {
                console.log('Enter 键被按下，执行操作');
                // 这里可以添加你想要执行的具体操作
            }
        });
    </script>
</body>

</html>
